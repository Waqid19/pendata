<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medika Nusantara</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="lapisan-luar">
        <div class="kartu-login">
            
            <div class="bagian-atas">
                <div class="logo">
                    <img src="../logo.png" alt="logo" class="gambar-logo">
                    <span>Medika Nusantara</span>
                </div>
                
                <h2>Akses Portal Pasien</h2>
            </div>

            <form>
                <div class="bungkus-input">
                    <input type="text" placeholder="Username / Email">
                </div>

                <div class="bungkus-input">
                    <input type="password" placeholder="Password">
                </div>

                <div class="tautan-lupa">
                    <a href="#">Lupa Kata Sandi?</a>
                </div>

                <a href="../dashbord/dashbord.html" class="tombol-masuk">Masuk</a>

                <p class="teks-bawah">
                    Belum punya akun? <a href="../register/register.html">Daftar</a>
                </p>
            </form>

        </div>
    </div>
</body>
</html>

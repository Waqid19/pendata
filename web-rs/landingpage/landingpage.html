<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medika Nusantara</title>
    <link rel="stylesheet" href="landingpage.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="../logo.png" alt="Logo" class="logo-gambar">
            <span>Medika Nusantara</span>
        </div>
        <nav>
            <a href="#">Berita</a>
            <a href="#">Kontak</a>
            <a href="#">Jadwal</a>
            <a href="../login/login.html" class="tombol-masuk-nav">Daftar/Login</a>
        </nav>
    </header>

    <section class="papan-utama">
        <div class="konten-utama">
            <h1>Selamat Datang di RS Medika Nusantara!</h1>
            <p>Memberikan pelayanan kesehatan terbaik dan terpercaya untuk Anda dan keluarga.</p>
            <a href="../login/login.html" class="tombol-utama">Daftar/Login</a>
        </div>
        <div class="gambar-utama">
            <img src="dokter.png" alt="Gambar Dokter" >
        </div>
    </section>

    <section class="fitur">
        
        <div class="kartu-fitur">
            <h3>Layanan Unggulan</h3>
            <div class="layanan-kisi">
                <div class="layanan-item">
                    <img src="jantung.jpeg" alt="Jantung">
                    <p>Jantung</p>
                </div>
                <div class="layanan-item">
                    <img src="saraf.jpeg" alt="Saraf">
                    <p>Saraf</p>
                </div>
                <div class="layanan-item">
                    <img src="ibuanak.jpeg" alt="Ibu & Anak">
                    <p>Ibu & Anak</p>
                </div>
            </div>
        </div>

        <div class="kartu-fitur cari-dokter">
            <h3>Temukan Dokter</h3>
            <select>
                <option>Spesialisasi</option>
            </select>
            <input type="text" placeholder="Nama Dokter">
        </div>

        <div class="kartu-fitur">
            <h3>Fasilitas Kami</h3>
            <div class="fasilitas-kisi">
                <div class="fasilitas-item">
                    <img src="ugd1.png" alt="UGD" class="ikon">
                    <p>UGD 24 Jam</p>
                </div>
                <div class="fasilitas-item">
                    <img src="radiologi.png" alt="Radiologi" class="ikon">
                    <p>Radiologi</p>
                </div>
                <div class="fasilitas-item">
                    <img src="lab.png" alt="Laboratorium" class="ikon">
                    <p>Laboratorium</p>
                </div>
            </div>
        </div>

    </section>
</body>
</html>
